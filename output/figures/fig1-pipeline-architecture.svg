<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" width="800" height="340">
  <rect width="800" height="340" fill="#ffffff"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#111111">Figure 1. MCP → A2A → A2UI pipeline architecture with layer-wise fidelity capture points</text>

  <!-- ── Layer boxes ── -->
  <!-- MCP -->
  <rect x="40" y="70" width="160" height="76" rx="8" fill="#e8e4fb" stroke="#6c5ce7" stroke-width="1.5"/>
  <text x="120" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#3d2c8d">MCP Server</text>
  <text x="120" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#534ab7">FastMCP + FAISS</text>
  <text x="120" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#534ab7">retrieve(query, k=3)</text>

  <!-- Arrow MCP→R0 -->
  <line x1="200" y1="108" x2="248" y2="108" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- R0 label -->
  <rect x="250" y="90" width="44" height="36" rx="6" fill="#f1efe8" stroke="#888780" stroke-width="1"/>
  <text x="272" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#2c2c2a">R₀</text>
  <text x="272" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5f5e5a">raw chunks</text>

  <!-- Arrow R0→A2A -->
  <line x1="294" y1="108" x2="316" y2="108" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- A2A -->
  <rect x="318" y="70" width="160" height="76" rx="8" fill="#d8f5e8" stroke="#0f6e56" stroke-width="1.5"/>
  <text x="398" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#04342c">A2A Orchestrator</text>
  <text x="398" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#085041">LangGraph 2-node</text>
  <text x="398" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#085041">synthesise answer</text>

  <!-- Arrow A2A→R1 -->
  <line x1="478" y1="108" x2="526" y2="108" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- R1 label -->
  <rect x="528" y="90" width="44" height="36" rx="6" fill="#f1efe8" stroke="#888780" stroke-width="1"/>
  <text x="550" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#2c2c2a">R₁</text>
  <text x="550" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5f5e5a">NL answer</text>

  <!-- Arrow R1→A2UI -->
  <line x1="572" y1="108" x2="594" y2="108" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- A2UI -->
  <rect x="596" y="70" width="160" height="76" rx="8" fill="#faecea" stroke="#993c1d" stroke-width="1.5"/>
  <text x="676" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#4a1b0c">A2UI Formatter</text>
  <text x="676" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#712b13">JSON schema</text>
  <text x="676" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#712b13">Streamlit render</text>

  <!-- Arrow A2UI→R2 down -->
  <line x1="676" y1="146" x2="676" y2="178" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- R2 label -->
  <rect x="652" y="180" width="48" height="36" rx="6" fill="#f1efe8" stroke="#888780" stroke-width="1"/>
  <text x="676" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#2c2c2a">R₂</text>
  <text x="676" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5f5e5a">JSON payload</text>

  <!-- ── Scoring arrows pointing down from R0, R1, R2 to ground truth ── -->
  <text x="400" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#333">Ground truth reference answer (human-written from httpx docs)</text>
  <rect x="120" y="254" width="560" height="28" rx="6" fill="#faeeda" stroke="#ba7517" stroke-width="1.2"/>
  <text x="400" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#633806">BERTScore Precision, Recall, F1(Rₙ, reference) — same reference for all three layers</text>

  <!-- Score arrows -->
  <line x1="272" y1="126" x2="272" y2="252" stroke="#ba7517" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arramber)"/>
  <line x1="550" y1="126" x2="550" y2="252" stroke="#ba7517" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arramber)"/>
  <line x1="676" y1="216" x2="676" y2="252" stroke="#ba7517" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arramber)"/>

  <!-- Delta labels -->
  <text x="411" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#854f0b">Δ₁ = F1(R₁)−F1(R₀)</text>
  <text x="613" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#854f0b">Δ₂ = F1(R₂)−F1(R₁)</text>

  <!-- Caption -->
  <text x="400" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">R₀ = raw MCP tool return · R₁ = A2A synthesised response · R₂ = A2UI JSON payload · dashed = BERTScore P, R, F1 · Δ₁/Δ₂ = F1 deltas · Δ₁ᴿ/Δ₂ᴿ = Recall deltas</text>

  <!-- Arrowhead markers -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arramber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#ba7517" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
</svg>
