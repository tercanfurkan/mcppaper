name: Build PDF

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: layer_wise_fidelity_evaluation_of_multi_layer_agentic_ai_pipelines
          path: main.pdf

      - name: Prepare Pages directory
        run: |
          mkdir _site
          cp main.pdf "_site/layer_wise_fidelity_evaluation_of_multi_layer_agentic_ai_pipelines.pdf"
          cp index.html _site/

      - name: Deploy PDF to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
